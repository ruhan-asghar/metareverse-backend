services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: [redis-data:/data]

  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports: ["8000:8000"]
    env_file: .env.local
    environment:
      REDIS_URL: redis://redis:6379/0
      META_MODE: mock
    volumes:
      - ./app:/app/app
      - ./main.py:/app/main.py
    depends_on: [redis]

  worker:
    build: .
    command: celery -A app.celery_app worker -Q publish,insights,email,health --loglevel=info
    env_file: .env.local
    environment:
      REDIS_URL: redis://redis:6379/0
      META_MODE: mock
    volumes: [./app:/app/app]
    depends_on: [redis]

  beat:
    build: .
    command: celery -A app.celery_app beat --scheduler redbeat.RedBeatScheduler --loglevel=info
    env_file: .env.local
    environment:
      REDIS_URL: redis://redis:6379/0
      META_MODE: mock
    volumes: [./app:/app/app]
    depends_on: [redis]

volumes:
  redis-data:
