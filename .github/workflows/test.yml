name: Backend CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: pytest + ruff
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Dummy values so `from app.core.config import get_settings` succeeds at import time.
    # Mirrors the env set by scripts/export_openapi.py. Real secrets live in Railway, not CI.
    env:
      DATABASE_URL: postgresql://u:p@localhost/db
      CLERK_SECRET_KEY: sk_test_dummy
      CLERK_WEBHOOK_SECRET: whsec_dummy
      SUPABASE_URL: http://localhost
      SUPABASE_ANON_KEY: anon_dummy
      SUPABASE_SERVICE_ROLE_KEY: svc_dummy
      R2_ACCOUNT_ID: acc
      R2_ACCESS_KEY_ID: akid
      R2_SECRET_ACCESS_KEY: sk
      R2_BUCKET_NAME: metareverse-media
      R2_ENDPOINT: https://example.r2.cloudflarestorage.com
      META_APP_ID: "0"
      META_APP_SECRET: secret
      RESEND_API_KEY: re_dummy
      META_MODE: mock
      REDIS_URL: redis://localhost:6379/0
      CLOUDFLARE_API_TOKEN: dummy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app main.py tests

      - name: Run unit + contract + tasks tests with coverage
        # Coverage threshold is intentionally loose (60%) while Week-2 wiring
        # stabilises. Tighten to 80 once publish/insights/email flows have
        # fuller test coverage.
        run: |
          pytest -q \
            -m "not integration" \
            tests/unit tests/contract tests/tasks \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=60
